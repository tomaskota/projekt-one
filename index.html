<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projekt ONE</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
<header class="hero">
<h1>💪 Projekt ONE</h1>
<div id="today"></div>
</header>

<section class="card">
<h2>Ahoj Tomáši 👋</h2>
<p>Tvůj cíl: <b>84 kg</b></p>
<div class="progress"><div id="bar"></div></div>
<p id="weightText"></p>
<input id="weight" type="number" step="0.1">
<button id="saveWeight">Uložit váhu</button>
</section>

<section class="card">
<h2>Dnešní plán</h2>
<p id="plan"></p>
<button class="primary">Začít trénink</button>
</section>

<nav class="bottom">
<button class="active">🏠<span>Domů</span></button>
<button>💪<span>Trénink</span></button>
<button>🥗<span>Jídlo</span></button>
<button>📈<span>Pokrok</span></button>
</nav>
</div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
